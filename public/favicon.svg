<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img"
  aria-label="Grid favicon with dots and square">
  <defs>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.9" />
    </filter>
  </defs>

  <rect width="64" height="64" fill="#FBF5F1" />

  <!-- dark green grid -->
  <g stroke="#1C4A34" stroke-width="2.2" stroke-linecap="round" fill="none">
    <!-- verticals -->
    <line x1="19" y1="11" x2="19" y2="46" />
    <line x1="32" y1="11" x2="32" y2="46" />
    <line x1="45" y1="11" x2="45" y2="37" />

    <!-- horizontals -->
    <line x1="12" y1="18" x2="25" y2="18" />
    <line x1="12" y1="18" x2="12" y2="18" opacity="0" />
    <line x1="12" y1="18" x2="25" y2="18" />
    <line x1="12" y1="18" x2="25" y2="18" />
    <line x1="25" y1="18" x2="12" y2="18" opacity="0" />
    <line x1="26" y1="18" x2="47" y2="18" />

    <line x1="12" y1="31" x2="25" y2="31" />
    <line x1="26" y1="31" x2="47" y2="31" />

    <line x1="12" y1="44" x2="38" y2="44" />
  </g>

  <!-- brass dot -->
  <circle cx="31.2" cy="18.2" r="3.9" fill="#B07E2E" />

  <!-- blurred droplet above center -->
  <ellipse cx="32.0" cy="25.9" rx="1.05" ry="2.2" fill="#8FA596" opacity="0.9"
    filter="url(#softBlur)" />

  <!-- center dark green dot -->
  <circle cx="31.1" cy="30.7" r="3.2" fill="#1C4A34" />

  <!-- red square -->
  <rect x="45.1" y="39.0" width="10.4" height="10.4" rx="1.0" fill="#FA4E2C" />
</svg>

